# LLM 配置
llm:
  # api_key: 从 OPENAI_API_KEY 环境变量获取
  base_url: https://api.deepseek.com
  model_name: deepseek-reasoner
  temperature: 0.7
  max_tokens: 2000

# Agent 配置
agent:
  memory_type: buffer
  max_history: 10
  react_max_iterations: 6

# RAG 配置
rag:
  collection_name: rag_collection
  vector_dim: 1024
  chunk_size: 1024
  chunk_overlap: 0.1
  milvus:
    host: "localhost"
    # host: 从 MILVUS_HOST 环境变量获取（可选）
    port: 19530

# Embedding 配置
embedding:
  model_name: BAAI/bge-large-zh-v1.5
  # api_key: 从 EMBEDDING_API_KEY 环境变量获取
  base_url: https://api.siliconflow.cn/v1/embeddings

# Rerank 配置
rerank:
  model_name: qwen-rerank
  # api_key: 从 REANK_API_KEY 环境变量获取
  base_url: https://api.deepseek.com

# OCR 配置
ocr:
  model_name: PaddleOCR-VL-1.5
  # api_key: 从 PADDLEOCR_API_KEY 环境变量获取
  base_url: https://paddleocr.aistudio-app.com/api/v2/ocr/jobs


# 工具配置
tool:
  websearch:
    enabled: True
    api_url: "https://api.tavily.com"
    api_key: "your_tavily_api_key"

  youdao_dictionary:
    enabled: True
    base_url: "https://openapi.youdao.com/v2/dict"
    api_key: "your_youdao_api_key"

  # 派欧云代码沙箱配置
  ppio_sandbox:
    enabled: False  # 是否启用PPIO沙箱
    # api_key: 从 PPIO_API_KEY 环境变量获取
    base_url: "https://api.ppio.cloud"
    default_timeout: 60  # 普通代码默认超时（秒）
    
    # Remotion 专用配置
    remotion:
      enabled: True
      timeout: 600  # 视频渲染超时（秒）
      default_template: "with-media"  # 默认项目模板
      available_templates:
        - hello-world
        - with-media
        - with-voiceover
      runtimes:
        default: "nodejs20"
        available:
          - nodejs18
          - nodejs20
      quality_presets:
        - "720p"
        - "1080p"
        - "1440p"
        - "4k"
      output_formats:
        - "mp4"
        - "webm"
        - "prores"
    
    # 视频存储配置
    video_storage:
      type: "local"  # local | oss
      local_path: "./temp/videos"
      local_url: "/videos"
      # OSS配置（当type=oss时）
      # oss_bucket: "your-bucket"
      # oss_endpoint: "oss-cn-hangzhou.aliyuncs.com"


# 技能上传工具配置
skill:
  enabled: True
  url: "src/agent/skills/"

  skill_files:
    - name: order-refund-processing
      enabled: False
    - name: word_learning
      enabled: True
